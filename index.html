<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的相册 | My Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --surface: #141414; --text: #f5f5f5;
            --text-secondary: #999; --accent: #e8c47c; --radius: 12px;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', 'Noto Serif SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        .hero { position: relative; height: 60vh; min-height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
        .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(232,196,124,0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 50%, rgba(124,196,232,0.06) 0%, transparent 50%); pointer-events: none; }
        .hero-title { font-family: 'Noto Serif SC', serif; font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 600; letter-spacing: 0.05em; margin-bottom: 0.5rem; opacity: 0; animation: fadeUp 1s ease forwards 0.2s; }
        .hero-subtitle { font-size: clamp(0.95rem, 2vw, 1.15rem); color: var(--text-secondary); font-weight: 300; letter-spacing: 0.15em; opacity: 0; animation: fadeUp 1s ease forwards 0.5s; }
        .hero-line { width: 60px; height: 1px; background: var(--accent); margin: 1.5rem auto; opacity: 0; animation: fadeUp 1s ease forwards 0.7s; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .gallery { max-width: 1400px; margin: 0 auto; padding: 0 1.5rem 4rem; columns: 3; column-gap: 1rem; }
        .gallery-item { break-inside: avoid; margin-bottom: 1rem; border-radius: var(--radius); overflow: hidden; position: relative; cursor: pointer; transition: var(--transition); opacity: 0; transform: translateY(20px); }
        .gallery-item.visible { opacity: 1; transform: translateY(0); }
        .gallery-item:hover { transform: translateY(-4px) scale(1.01); }
        .gallery-item img { width: 100%; display: block; transition: transform 0.6s ease; }
        .gallery-item:hover img { transform: scale(1.03); }
        .gallery-item .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%); opacity: 0; transition: var(--transition); display: flex; align-items: flex-end; padding: 1.2rem; }
        .gallery-item:hover .overlay { opacity: 1; }
        .overlay-text { font-size: 0.9rem; color: #fff; font-weight: 300; }
        .overlay-category { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 0.3rem; }
        @media (max-width: 900px) { .gallery { columns: 2; } }
        @media (max-width: 550px) { .gallery { columns: 1; padding: 0 1rem 3rem; } .hero { height: 45vh; min-height: 300px; } }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
        .loading .spinner { width: 32px; height: 32px; border: 2px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .lightbox { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(20px); }
        .lightbox.active { opacity: 1; pointer-events: all; }
        .lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: 8px; box-shadow: 0 20px 80px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.35s ease; }
        .lightbox.active img { transform: scale(1); }
        .lightbox-close { position: absolute; top: 1.5rem; right: 1.5rem; width: 44px; height: 44px; border: none; background: rgba(255,255,255,0.1); color: #fff; border-radius: 50%; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 48px; height: 48px; border: none; background: rgba(255,255,255,0.08); color: #fff; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }
        .lightbox-prev { left: 1.5rem; } .lightbox-next { right: 1.5rem; }
        .lightbox-info { position: absolute; bottom: 2rem; text-align: center; width: 100%; }
        .lightbox-info .title { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; color: #fff; }
        .lightbox-info .counter { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 0.4rem; }
        .footer { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); font-size: 0.8rem; letter-spacing: 0.1em; }
    </style>
</head>
<body>
    <section class="hero">
        <h1 class="hero-title">我的相册</h1>
        <div class="hero-line"></div>
        <p class="hero-subtitle">记录生活中每一个闪光的瞬间</p>
    </section>
    <div class="gallery" id="gallery"><div class="loading"><div class="spinner"></div><div>正在加载照片...</div></div></div>
    <footer class="footer"><p>© 2025 MY GALLERY · 用热爱记录生活</p></footer>
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lb-close">✕</button>
        <button class="lightbox-nav lightbox-prev" id="lb-prev">‹</button>
        <button class="lightbox-nav lightbox-next" id="lb-next">›</button>
        <img src="" alt="" id="lb-img">
        <div class="lightbox-info"><div class="title" id="lb-title"></div><div class="counter" id="lb-counter"></div></div>
    </div>
    <script>
    // ========== 配置区：以后加新文件夹，在这里加一行就行 ==========
    const FOLDERS = [
        { path: 'images/life',    label: '生活', icon: '☕' },
        { path: 'images/travel',  label: '旅行', icon: '✈️' },
        { path: 'images/nature',  label: '自然', icon: '🌿' },
        { path: 'images/portrait', label: '人像', icon: '👤' },
    ];
    // ========== 以下代码不需要改 ==========
    const USER = 'closer321', REPO = 'my-gallery', BRANCH = 'main';
    const EXTS = ['jpg','jpeg','png','gif','webp','bmp'];
    let items = [], idx = 0;
    const gallery = document.getElementById('gallery');
    const lb = document.getElementById('lightbox'), lbImg = document.getElementById('lb-img');
    const lbTitle = document.getElementById('lb-title'), lbCounter = document.getElementById('lb-counter');

    async function fetchDir(p) {
        try {
            const r = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${p}`);
            if (!r.ok) return [];
            const d = await r.json();
            return d.filter(f => f.type === 'file' && EXTS.includes(f.name.split('.').pop().toLowerCase()));
        } catch { return []; }
    }

    async function load() {
        gallery.innerHTML = '';
        items = [];
        let all = [];
        for (const f of FOLDERS) {
            const files = await fetchDir(f.path);
            files.forEach(file => all.push({ ...file, cat: f.label, icon: f.icon }));
        }
        if (!all.length) { gallery.innerHTML = '<div class="loading">还没有照片，上传到 images/ 文件夹后会自动显示</div>'; return; }
        all.forEach((f, i) => {
            const title = f.name.replace(/\.[^/.]+$/, '').replace(/[_-]/g, ' ');
            const url = `https://raw.githubusercontent.com/${USER}/${REPO}/${BRANCH}/${f.path}`;
            const el = document.createElement('div');
            el.className = 'gallery-item';
            el.innerHTML = `<img src="${url}" alt="${title}" loading="lazy"><div class="overlay"><div><div class="overlay-text">${title}</div><div class="overlay-category">${f.icon} ${f.cat}</div></div></div>`;
            el.onclick = () => openLb(i);
            gallery.appendChild(el);
            items.push({ title, url });
        });
        const obs = new IntersectionObserver(es => { es.forEach(e => { if (e.isIntersecting) { setTimeout(() => e.target.classList.add('visible'), 60); obs.unobserve(e.target); } }); }, { threshold: 0.1 });
        document.querySelectorAll('.gallery-item').forEach(el => obs.observe(el));
    }

    function openLb(i) { idx = i; showLb(); lb.classList.add('active'); document.body.style.overflow = 'hidden'; }
    function showLb() { lbImg.src = items[idx].url; lbTitle.textContent = items[idx].title; lbCounter.textContent = `${idx + 1} / ${items.length}`; }
    function closeLb() { lb.classList.remove('active'); document.body.style.overflow = ''; }
    document.getElementById('lb-close').onclick = closeLb;
    lb.onclick = e => { if (e.target === lb) closeLb(); };
    document.getElementById('lb-prev').onclick = e => { e.stopPropagation(); idx = (idx - 1 + items.length) % items.length; showLb(); };
    document.getElementById('lb-next').onclick = e => { e.stopPropagation(); idx = (idx + 1) % items.length; showLb(); };
    document.onkeydown = e => { if (!lb.classList.contains('active')) return; if (e.key === 'Escape') closeLb(); if (e.key === 'ArrowLeft') { idx = (idx - 1 + items.length) % items.length; showLb(); } if (e.key === 'ArrowRight') { idx = (idx + 1) % items.length; showLb(); } };
    load();
    </script>
</body>
</html>
